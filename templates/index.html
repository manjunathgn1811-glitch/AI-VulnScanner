<!DOCTYPE html>
<html>
<head>

<title>AI Vulnerability Scanner</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background:#081c3a;
    height:100vh;
}

.hero{
    margin-top:120px;
}

.card-box{
    background:white;
    border-radius:20px;
    padding:40px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.heading{
    color:#081c3a;
    font-weight:bold;
}

.btn-scan{
    background:#0d6efd;
    border:none;
}

.logo{
    font-size:50px;
}

</style>

</head>

<body>

<div class="container">

<div class="row justify-content-center hero">

<div class="col-md-7">

<div class="card-box">

<center>

<h1 class="logo">🛡️</h1>

<h2 class="heading">
AI-Powered Vulnerability Assessment
</h2>

<p>
Network Discovery • Service Detection • CVE Lookup • Risk Analysis
</p>

<form method="POST" action="/scan">

<input
type="text"
name="target"
class="form-control mb-3"
placeholder="Enter Target IP"
required>

<button class="btn btn-primary btn-scan w-100">
Start Assessment
</button>

</form>

</center>

</div>

</div>

</div>

</div>

</body>
</html>
